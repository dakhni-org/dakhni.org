name: Build & Validate
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate and build site
        run: python3 scripts/build_site.py
      - name: Check all pages rendered
        run: |
          count=$(find . -name "index.html" | grep -v node_modules | wc -l)
          echo "Rendered $count pages"
          test "$count" -gt 50
